<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dinero Labs</title>
  <meta http-equiv="refresh" content="0; url=https://dinero-coin.com/">
  <link rel="canonical" href="https://dinero-coin.com/">
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fb;
      color: #111827;
    }
    main {
      width: min(680px, calc(100vw - 40px));
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: clamp(32px, 6vw, 56px); letter-spacing: 0; }
    p { margin: 0 0 24px; color: #5b6472; font-size: 18px; line-height: 1.55; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border: 1px solid #111827;
      border-radius: 6px;
      color: #111827;
      text-decoration: none;
      font-weight: 700;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #090d14; color: #f7f8fb; }
      p { color: #aab3c2; }
      a { color: #f7f8fb; border-color: #f7f8fb; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Dinero Labs</h1>
    <p>Redirecting to the official Dinero download and network portal.</p>
    <a href="https://dinero-coin.com/">Open dinero-coin.com</a>
  </main>
</body>
</html>
